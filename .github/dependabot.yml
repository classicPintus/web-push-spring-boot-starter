version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "org.springframework.boot*"
      test:
        patterns:
          - "org.junit*"
          - "org.assertj*"
          - "org.mockito*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
